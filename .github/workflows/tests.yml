##### GitHub CI configuration #####
##### See: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs #####

name: lint/test/coverage CI
on:
  push:
    branches: [ dev ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 25.x ]
    name: Linting with Node.js ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 25.x ]
    name: Testing with Node.js ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run build --if-present
      - run: cp .env.example .env.local
      - run: npm test
  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 25.x ]
    name: Coverage with Node.js ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run build --if-present
      - run: cp .env.example .env.local
      - run: npm run test:coverage:lcov
      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
